<!DOCTYPE html>
<html lang="en"
    xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form" id="loginForm" method="post" th:action="@{/api/v1/auth/login/}" th:object="${authRequest}">
            <h2>Welcome Back</h2>
            <p>Please enter your details to sign in.</p>
            
            <div class="input-group">
                <input type="text" id="email" th:field="*{username}" required placeholder=" ">
                <label for="email">User Name</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" th:field="*{password}" required placeholder=" ">
                <label for="password">Password</label>
                <span class="toggle-password" id="togglePassword">👁️</span>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>

            <div class="register-link">
                Don't have an account? <a th:href="@{/api/v1/auth/register}">Create one</a>
            </div>
        </form>
    </div>
    <script src="/js/script.js"></script>
</body>
</html>
